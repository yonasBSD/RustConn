name: rustconn
base: core24
version: '0.16.3'
title: RustConn
summary: Manage remote connections easily
description: |
  RustConn is a modern connection manager for Linux with a GTK4/Wayland-native
  interface. Manage SSH, RDP, VNC, SPICE, MOSH, Telnet, Serial, Kubernetes, and
  Zero Trust connections from a single application. Core protocols use embedded
  Rust implementations — no external dependencies required.

  Protocols (embedded Rust implementations):
  - SSH with embedded VTE terminal, split view, and scrollbar
  - RDP via IronRDP (embedded, with FreeRDP fallback)
  - VNC via vnc-rs (embedded, with TigerVNC fallback)
  - SPICE via spice-client (embedded, with remote-viewer fallback)
  - MOSH with predict mode and UDP port range
  - Telnet via external telnet client
  - Serial via picocom (RS-232/USB serial consoles)
  - Kubernetes via kubectl exec (shell access to pods)
  - Zero Trust: AWS SSM, GCP IAP, Azure Bastion, OCI Bastion,
    Cloudflare, Teleport, Tailscale, Boundary, Hoop.dev

  Cloud Sync:
  - Synchronize connections via shared directories (Google Drive,
    Syncthing, Nextcloud, Dropbox, USB)
  - Group Sync with Master/Import access model
  - Simple Sync with UUID-based merge and tombstone deletion

  File Transfer:
  - SFTP file browser via Midnight Commander with split-panel navigation

  Organization:
  - Groups, tags, templates, and smart folders
  - Connection history and statistics
  - Session logging and recording
  - Tab Overview, Tab Pinning, and Tab Switcher

  Import/Export:
  - Asbru-CM, Remmina, SSH config, Ansible inventory, CSV
  - Royal TS, MobaXterm, RDP files, libvirt, native format (.rcn)

  Security:
  - KeePassXC (KDBX files and proxy)
  - libsecret (GNOME Keyring)
  - Bitwarden CLI, 1Password CLI, Passbolt CLI, Pass (passwordstore.org)

  Productivity:
  - Split terminals with multi-panel layouts
  - Command snippets and cluster broadcast
  - Custom terminal themes and per-connection color overrides
  - Remote host monitoring (CPU, memory, disk, network)
  - Wake-on-LAN with auto-connect

  Note: This snap uses strict confinement with embedded protocol clients
  (SSH, RDP via IronRDP, VNC via vnc-rs, SPICE) bundled in the snap. Optional
  external CLIs (Zero Trust providers, password managers) are downloaded on
  demand into the snap's writable user data and run inside the sandbox — no
  host access is required.

grade: stable
confinement: strict
icon: rustconn/assets/icons/hicolor/256x256/apps/io.github.totoshko88.RustConn.png
license: GPL-3.0-or-later
website: https://github.com/totoshko88/RustConn
source-code: https://github.com/totoshko88/RustConn
issues: https://github.com/totoshko88/RustConn/issues
donation: https://donatello.to/totoshko88
contact: totoshko88@gmail.com

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

# NOTE: GTK4/libadwaita runtime (GTK, Pango, Cairo, gdk-pixbuf, graphene,
# Mesa/GL, GNOME themes), the desktop-launch command-chain, the correct
# XDG/D-Bus/fontconfig environment AND the matching AppArmor accesses are all
# provided by the `gnome` extension via the gnome-46-2404 platform snap. We
# therefore do NOT stage GTK here, do NOT define a custom launcher wrapper, and
# do NOT hand-roll GTK environment variables — that earlier manual approach
# (required while core26 had no gnome extension) is what broke startup under
# strict confinement on Ubuntu 26.04 (issue #174). The extension is only
# available for core22/core24, so we target core24 (Ubuntu 24.04 LTS); its VTE
# 0.76 satisfies the app's `vte4 v0_76` requirement.
#
# libadwaita: the core24 gnome platform (gnome-46-2404) ships libadwaita 1.5,
# so the GUI is built WITHOUT `--features adw-1-8` (the 1.6/1.7/1.8 widgets are
# behind cfg-features with full 1.5 fallbacks — AdwSpinner→GtkSpinner,
# AdwToggleGroup→linked buttons, AdwShortcutsDialog→legacy dialog). The Flatpak
# build keeps adw-1-8 (GNOME 50 runtime); the snap trades that polish for a
# working strictly-confined app until the gnome extension supports core26.

plugs:
  ssh-keys:
    interface: ssh-keys
  serial-port:
    interface: serial-port
  aws-credentials:
    interface: personal-files
    read:
      - $HOME/.aws
    write:
      - $HOME/.aws/sso/cache
  gcloud-credentials:
    interface: personal-files
    read:
      - $HOME/.config/gcloud
  azure-credentials:
    interface: personal-files
    read:
      - $HOME/.azure
  oci-credentials:
    interface: personal-files
    read:
      - $HOME/.oci
  kube-credentials:
    interface: personal-files
    read:
      - $HOME/.kube

# The GTK application owns its well-known D-Bus name (matching the app ID /
# desktop file) on the session bus via `g_application_register`. Under strict
# confinement the snap may only own names derived from the snap name, so we
# declare a `dbus` slot granting AppArmor permission to own the app-ID name.
# The providing snap is auto-granted ownership, so no manual connection is
# needed. Without this the app fails to register ("not allowed to own the
# service ... due to AppArmor policy").
slots:
  dbus-rustconn:
    interface: dbus
    bus: session
    name: io.github.totoshko88.RustConn

apps:
  rustconn:
    command: usr/bin/rustconn
    extensions: [gnome]
    desktop: usr/share/applications/io.github.totoshko88.RustConn.desktop
    common-id: io.github.totoshko88.RustConn
    slots:
      - dbus-rustconn
    plugs:
      - audio-playback
      - network
      - network-bind
      - home
      - ssh-keys
      - serial-port
      - password-manager-service
      - aws-credentials
      - gcloud-credentials
      - azure-credentials
      - oci-credentials
      - kube-credentials

  rustconn-cli:
    command: usr/bin/rustconn-cli
    plugs:
      - network
      - home
      - ssh-keys
      - serial-port
      # Keyring access for `rustconn-cli secret` — keep in sync with the
      # GUI app plugs above
      - password-manager-service
      - aws-credentials
      - gcloud-credentials
      - azure-credentials
      - oci-credentials
      - kube-credentials

parts:
  rustconn:
    plugin: rust
    source: .
    rust-channel: "1.95"
    # NOTE: we do NOT use `rust-features` here. The snapcraft rust plugin runs
    # `cargo install --features <list>` once per `rust-path` crate, which fails
    # for a workspace with crate-specific features. Instead override-build runs
    # a single workspace `cargo build` (see below), like the Flatpak manifest.
    build-packages:
      # GTK4/libadwaita/GLib dev files also come from the gnome SDK (added by
      # the `gnome` extension build environment); we keep the distro dev
      # packages too so the workspace `cargo build` always resolves
      # gtk4-4.0.pc / libadwaita-1.pc (noble ships GTK 4.14 + libadwaita 1.5,
      # matching the gnome-46-2404 runtime). VTE for GTK4 is NOT in the SDK.
      - libgtk-4-dev
      - libadwaita-1-dev
      - libvte-2.91-gtk4-dev
      - libssl-dev
      - libasound2-dev
      - pkg-config
      - clang
      - cmake
      - gettext
    stage-packages:
      # VTE (GTK4 terminal widget) is NOT provided by the gnome-46-2404 platform
      # at runtime, so it MUST be staged. But the .deb drags the whole GTK4 stack
      # (libgtk-4, GLib, Pango, Cairo, gdk-pixbuf, graphene, harfbuzz, librsvg)
      # as dependencies. Shipping a second copy of those is fatal: the platform's
      # libadwaita would load against OUR libgtk-4 (ABI mismatch → transparent
      # window) and the platform's SVG loader against OUR librsvg (→ broken
      # icons). The `prime:` block below drops every GTK/GLib/render library so
      # the platform's single, matched copy is used; only libvte itself is kept.
      - libvte-2.91-gtk4-0
      - libasound2t64
      - libssl3t64
      - openssh-client
      - mc
      - picocom
      - inetutils-telnet
      - waypipe
      # python3 enables the pip-based Zero Trust CLIs (Azure `az`, Oracle `oci`)
      # that the Components dialog installs at runtime. The Flatpak GNOME
      # runtime ships Python; under snap we must stage it explicitly.
      - python3
      - python3-venv
    prime:
      # Drop the GTK4/GLib/rendering stack dragged in by libvte's dependencies.
      # All of these are provided by the gnome-46-2404 platform; staging a second
      # copy causes the platform libadwaita/loaders to bind against our copies
      # (ABI mismatch → transparent window + broken icons). Keeping a single
      # instance of GTK, GLib and GObject across the whole process is mandatory.
      # libvte itself (libvte-2.91-gtk4.so) is intentionally NOT excluded.
      - -usr/lib/x86_64-linux-gnu/libgtk-4.so*
      - -usr/lib/x86_64-linux-gnu/libgdk_pixbuf-2.0.so*
      - -usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0
      - -usr/lib/x86_64-linux-gnu/librsvg-2.so*
      - -usr/lib/x86_64-linux-gnu/libpango-1.0.so*
      - -usr/lib/x86_64-linux-gnu/libpangocairo-1.0.so*
      - -usr/lib/x86_64-linux-gnu/libpangoft2-1.0.so*
      - -usr/lib/x86_64-linux-gnu/libcairo.so*
      - -usr/lib/x86_64-linux-gnu/libcairo-gobject.so*
      - -usr/lib/x86_64-linux-gnu/libcairo-script-interpreter.so*
      - -usr/lib/x86_64-linux-gnu/libgraphene-1.0.so*
      - -usr/lib/x86_64-linux-gnu/libharfbuzz.so*
      - -usr/lib/x86_64-linux-gnu/libharfbuzz-subset.so*
      - -usr/lib/x86_64-linux-gnu/libglib-2.0.so*
      - -usr/lib/x86_64-linux-gnu/libgio-2.0.so*
      - -usr/lib/x86_64-linux-gnu/libgobject-2.0.so*
      - -usr/lib/x86_64-linux-gnu/libgmodule-2.0.so*
      - -usr/lib/x86_64-linux-gnu/libgthread-2.0.so*
      - -usr/lib/x86_64-linux-gnu/libepoxy.so*
    override-build: |
      # Single workspace build matching packaging/flatpak (minus adw-1-8: the
      # core24 gnome platform provides libadwaita 1.5, and the 1.6/1.7/1.8
      # widgets have cfg-gated 1.5 fallbacks). Global LTO via --config keeps the
      # binary small (equivalent to the plugin's rust-use-global-lto).
      cargo build --release \
        --config 'profile.release.lto = true' \
        --config 'profile.release.codegen-units = 1' \
        -p rustconn \
        -p rustconn-cli
      install -Dm755 target/release/rustconn "$CRAFT_PART_INSTALL/usr/bin/rustconn"
      install -Dm755 target/release/rustconn-cli "$CRAFT_PART_INSTALL/usr/bin/rustconn-cli"
      mkdir -p $CRAFT_PART_INSTALL/usr/share/applications
      mkdir -p $CRAFT_PART_INSTALL/usr/share/icons
      mkdir -p $CRAFT_PART_INSTALL/usr/share/metainfo
      cp rustconn/assets/io.github.totoshko88.RustConn.desktop $CRAFT_PART_INSTALL/usr/share/applications/
      cp rustconn/assets/io.github.totoshko88.RustConn.metainfo.xml $CRAFT_PART_INSTALL/usr/share/metainfo/
      cp -r rustconn/assets/icons/hicolor $CRAFT_PART_INSTALL/usr/share/icons/
      for po_file in po/*.po; do
        [ -f "$po_file" ] || continue
        lang=$(basename "$po_file" .po)
        mkdir -p "$CRAFT_PART_INSTALL/usr/share/locale/$lang/LC_MESSAGES"
        msgfmt -o "$CRAFT_PART_INSTALL/usr/share/locale/$lang/LC_MESSAGES/rustconn.mo" "$po_file"
      done
