name: rustconn
base: core26
build-base: devel
version: '0.15.6'
summary: Manage remote connections easily
description: |
  RustConn is a modern connection manager for Linux with a GTK4/Wayland-native
  interface. Manage SSH, RDP, VNC, SPICE, MOSH, Telnet, Serial, Kubernetes, and
  Zero Trust connections from a single application. Core protocols use embedded
  Rust implementations — no external dependencies required.

  Protocols (embedded Rust implementations):
  - SSH with embedded VTE terminal, split view, and scrollbar
  - RDP via IronRDP (embedded, with FreeRDP fallback)
  - VNC via vnc-rs (embedded, with TigerVNC fallback)
  - SPICE via spice-client (embedded, with remote-viewer fallback)
  - MOSH with predict mode and UDP port range
  - Telnet via external telnet client
  - Serial via picocom (RS-232/USB serial consoles)
  - Kubernetes via kubectl exec (shell access to pods)
  - Zero Trust: AWS SSM, GCP IAP, Azure Bastion, OCI Bastion,
    Cloudflare, Teleport, Tailscale, Boundary, Hoop.dev

  Cloud Sync:
  - Synchronize connections via shared directories (Google Drive,
    Syncthing, Nextcloud, Dropbox, USB)
  - Group Sync with Master/Import access model
  - Simple Sync with UUID-based merge and tombstone deletion

  File Transfer:
  - SFTP file browser via Midnight Commander with split-panel navigation

  Organization:
  - Groups, tags, templates, and smart folders
  - Connection history and statistics
  - Session logging and recording
  - Tab Overview, Tab Pinning, and Tab Switcher

  Import/Export:
  - Asbru-CM, Remmina, SSH config, Ansible inventory, CSV
  - Royal TS, MobaXterm, RDP files, libvirt, native format (.rcn)

  Security:
  - KeePassXC (KDBX files and proxy)
  - libsecret (GNOME Keyring)
  - Bitwarden CLI, 1Password CLI, Passbolt CLI, Pass (passwordstore.org)

  Productivity:
  - Split terminals with multi-panel layouts
  - Command snippets and cluster broadcast
  - Custom terminal themes and per-connection color overrides
  - Remote host monitoring (CPU, memory, disk, network)
  - Wake-on-LAN with auto-connect

  Note: This snap uses strict confinement with embedded protocol clients
  (SSH, RDP via IronRDP, VNC via vnc-rs, SPICE) bundled in the snap. Optional
  external CLIs (Zero Trust providers, password managers) are downloaded on
  demand into the snap's writable user data and run inside the sandbox — no
  host access is required.

grade: devel
confinement: strict
icon: rustconn/assets/icons/hicolor/256x256/apps/io.github.totoshko88.RustConn.png
license: GPL-3.0-or-later
website: https://github.com/totoshko88/RustConn
source-code: https://github.com/totoshko88/RustConn
issues: https://github.com/totoshko88/RustConn/issues
donation: https://donatello.to/totoshko88
contact: totoshko88@gmail.com

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

layout:
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/webkit2gtk-4.1
  /usr/share/xml/iso-codes:
    bind: $SNAP/usr/share/xml/iso-codes
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gdk-pixbuf-2.0:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gdk-pixbuf-2.0
  /usr/share/icons:
    bind: $SNAP/usr/share/icons
  /usr/share/glib-2.0/schemas:
    bind: $SNAP/usr/share/glib-2.0/schemas

plugs:
  gtk-3-themes:
    interface: content
    target: $SNAP/data-dir/themes
    default-provider: gtk-common-themes
  icon-themes:
    interface: content
    target: $SNAP/data-dir/icons
    default-provider: gtk-common-themes
  sound-themes:
    interface: content
    target: $SNAP/data-dir/sounds
    default-provider: gtk-common-themes
  ssh-keys:
    interface: ssh-keys
  serial-port:
    interface: serial-port
  aws-credentials:
    interface: personal-files
    write:
      - $HOME/.aws
  gcloud-credentials:
    interface: personal-files
    read:
      - $HOME/.config/gcloud
  azure-credentials:
    interface: personal-files
    read:
      - $HOME/.azure
  oci-credentials:
    interface: personal-files
    read:
      - $HOME/.oci
  kube-credentials:
    interface: personal-files
    read:
      - $HOME/.kube

apps:
  rustconn:
    command: usr/bin/rustconn-wrapper
    desktop: usr/share/applications/io.github.totoshko88.RustConn.desktop
    common-id: io.github.totoshko88.RustConn
    plugs:
      - desktop
      - desktop-legacy
      - gsettings
      - opengl
      - wayland
      - x11
      - audio-playback
      - network
      - network-bind
      - home
      - ssh-keys
      - serial-port
      - password-manager-service
      - gtk-3-themes
      - icon-themes
      - sound-themes
      - aws-credentials
      - gcloud-credentials
      - azure-credentials
      - oci-credentials
      - kube-credentials
    environment:
      GTK_USE_PORTAL: "1"
      GDK_BACKEND: wayland,x11
      GSETTINGS_SCHEMA_DIR: $SNAP/usr/share/glib-2.0/schemas
      GIO_MODULE_DIR: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gio/modules
      GDK_PIXBUF_MODULE_FILE: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gdk-pixbuf-2.0/2.10.0/loaders.cache
      XDG_DATA_DIRS: $SNAP/usr/share:$XDG_DATA_DIRS
      FONTCONFIG_PATH: $SNAP/etc/fonts
      FONTCONFIG_FILE: $SNAP/etc/fonts/fonts.conf

  rustconn-cli:
    command: usr/bin/rustconn-cli
    plugs:
      - network
      - home
      - ssh-keys
      - serial-port
      - aws-credentials
      - gcloud-credentials
      - azure-credentials
      - oci-credentials
      - kube-credentials

parts:
  rustconn:
    plugin: rust
    source: .
    rust-channel: "1.95"
    # NOTE: we do NOT use `rust-features` here. The snapcraft rust plugin runs
    # `cargo install --features <list>` once per `rust-path` crate, but the
    # `adw-1-8` feature only exists in the `rustconn` crate — applying it to
    # `rustconn-cli` would fail. Instead override-build performs a single
    # workspace build, exactly like the Flatpak manifest:
    #   cargo build --release -p rustconn --features adw-1-8 -p rustconn-cli
    build-packages:
      - libgtk-4-dev
      - libadwaita-1-dev
      - libvte-2.91-gtk4-dev
      - libssl-dev
      - libasound2-dev
      - pkg-config
      - clang
      - cmake
      - gettext
    stage-packages:
      - libgtk-4-1
      - libadwaita-1-0
      - libvte-2.91-gtk4-0
      - libasound2t64
      - libssl3t64
      - openssh-client
      - libgraphene-1.0-0
      - libpango-1.0-0
      - libpangocairo-1.0-0
      - libharfbuzz0b
      - libcairo2
      - libcairo-gobject2
      - libgdk-pixbuf-2.0-0
      - librsvg2-2
      - librsvg2-common
      - shared-mime-info
      - gsettings-desktop-schemas
      - libglib2.0-bin
      - fontconfig
      - fonts-dejavu-core
      - mc
      - picocom
      - inetutils-telnet
      - waypipe
      # python3 enables the pip-based Zero Trust CLIs (Azure `az`, Oracle `oci`)
      # that the Components dialog installs at runtime. The Flatpak GNOME
      # runtime ships Python; under snap we must stage it explicitly.
      - python3
      - python3-venv
    override-build: |
      # Single workspace build with the adw-1-8 feature for the GUI crate,
      # matching packaging/flatpak/io.github.totoshko88.RustConn.yml. Global
      # LTO is enabled via --config to keep binary size down (the plugin's
      # rust-use-global-lto would do the same, but we drive cargo directly).
      cargo build --release \
        --config 'profile.release.lto = true' \
        --config 'profile.release.codegen-units = 1' \
        -p rustconn --features adw-1-8 \
        -p rustconn-cli
      install -Dm755 target/release/rustconn "$CRAFT_PART_INSTALL/usr/bin/rustconn"
      install -Dm755 target/release/rustconn-cli "$CRAFT_PART_INSTALL/usr/bin/rustconn-cli"
      mkdir -p $CRAFT_PART_INSTALL/usr/share/applications
      mkdir -p $CRAFT_PART_INSTALL/usr/share/icons
      mkdir -p $CRAFT_PART_INSTALL/usr/share/metainfo
      cp rustconn/assets/io.github.totoshko88.RustConn.desktop $CRAFT_PART_INSTALL/usr/share/applications/
      cp rustconn/assets/io.github.totoshko88.RustConn.metainfo.xml $CRAFT_PART_INSTALL/usr/share/metainfo/
      cp -r rustconn/assets/icons/hicolor $CRAFT_PART_INSTALL/usr/share/icons/
      for po_file in po/*.po; do
        [ -f "$po_file" ] || continue
        lang=$(basename "$po_file" .po)
        mkdir -p "$CRAFT_PART_INSTALL/usr/share/locale/$lang/LC_MESSAGES"
        msgfmt -o "$CRAFT_PART_INSTALL/usr/share/locale/$lang/LC_MESSAGES/rustconn.mo" "$po_file"
      done
    override-prime: |
      craftctl default
      if [ -d usr/lib/*/gdk-pixbuf-2.0 ]; then
        /usr/lib/*/gdk-pixbuf-2.0/gdk-pixbuf-query-loaders > usr/lib/*/gdk-pixbuf-2.0/2.10.0/loaders.cache 2>/dev/null || true
      fi
      if [ -d usr/share/glib-2.0/schemas ]; then
        glib-compile-schemas usr/share/glib-2.0/schemas 2>/dev/null || true
      fi

  wrapper:
    plugin: dump
    source: snap/local
    organize:
      rustconn-wrapper: usr/bin/rustconn-wrapper
