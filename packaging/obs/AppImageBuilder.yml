version: 1
script:
  - cargo build --release -p rustconn -p rustconn-cli

AppDir:
  path: ./AppDir
  app_info:
    id: io.github.totoshko88.RustConn
    name: RustConn
    icon: rustconn
    version: 0.17.2
    exec: usr/bin/rustconn
    exec_args: $@
    author: Anton Isaiev
    license: GPL-3.0-or-later

  apt:
    arch: amd64
    # Noble (24.04 LTS) base — matches the GitHub release AppImage, which is
    # built on ubuntu-24.04 runners. Jammy lacked the GTK4 build of VTE.
    # Note the *t64 package renames from the 64-bit time_t transition.
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ noble main restricted universe multiverse
        key_url: http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ noble-updates main restricted universe multiverse

    include:
      - libgtk-4-1
      - libvte-2.91-gtk4-0
      - libglib2.0-0t64
      - libcairo2
      - libpango-1.0-0
      - libgdk-pixbuf-2.0-0
      - libharfbuzz0b
      - libfontconfig1
      - libfreetype6
      - libfribidi0
      - libpangocairo-1.0-0
      - libpangoft2-1.0-0
      - libgraphene-1.0-0
      - libepoxy0
      - libpcre2-8-0
      - libdbus-1-3
      - libasound2t64

  files:
    include:
      - usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0
      - usr/lib/x86_64-linux-gnu/gtk-4.0
      - usr/share/glib-2.0/schemas
      - usr/share/icons/Adwaita
      - usr/share/icons/hicolor

    exclude:
      - usr/share/doc
      - usr/share/man

  runtime:
    env:
      GTK_THEME: Adwaita
      GDK_BACKEND: wayland,x11

  test:
    # Only distros with glibc >= 2.39 can run a noble-based AppImage;
    # fedora-30 / ubuntu-focal test images are too old for this base.
    debian-stable:
      image: appimagecrafters/tests-env:debian-stable
      command: ./AppRun --version

AppImage:
  arch: x86_64
  update-information: gh-releases-zsync|totoshko88|RustConn|latest|RustConn-*x86_64.AppImage.zsync
