app-id: io.github.totoshko88.RustConn
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: rustconn

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /lib64/pkgconfig
  - /share/cmake
  - /share/doc
  - /share/info
  - /share/man
  - /share/pkgconfig
  - '*.la'
  - '*.a'

finish-args:
  # Library path for VTE (installed to lib64)
  - --env=LD_LIBRARY_PATH=/app/lib64:/app/lib
  # Wayland/X11 access
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Audio for RDP sessions
  - --socket=pulseaudio
  # Network access for SSH/RDP/VNC/SPICE connections
  - --share=network
  # Home directory access for SSH keys
  - --filesystem=home/.ssh:ro
  # AWS/GCP/Azure CLI config directories for ZeroTrust connections
  # .aws needs read-write: AWS CLI v2 SSO writes session tokens to ~/.aws/sso/cache/
  # and credential_process caches to ~/.aws/cli/cache/ during interactive login via local shell
  - --filesystem=home/.aws
  - --filesystem=home/.config/gcloud:ro
  - --filesystem=home/.azure:ro
  - --filesystem=home/.kube:ro
  # SSH agent socket
  - --socket=ssh-auth
  # D-Bus access for secret service (GNOME Keyring, KWallet)
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6
  # KeePassXC proxy access
  - --talk-name=org.keepassxc.KeePassXC.BrowserServer
  # System tray (StatusNotifierItem)
  - --talk-name=org.kde.StatusNotifierWatcher
  # Device access (serial ports for picocom require --device=all; no granular option exists)
  - --device=all
  # Downloads directory for SFTP file transfers via mc
  - --filesystem=xdg-download:create
  # Strip host-exported bash function mc() that sources /usr/share/mc/mc-wrapper.sh
  # (absent in sandbox); without this, the function shadows /app/bin/mc
  - --unset-env=BASH_FUNC_mc%%

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/rustconn/cargo
    RUST_BACKTRACE: '1'
    AWS_LC_SYS_CMAKE_BUILDER: '0'

modules:
  - name: fast-float
    buildsystem: cmake-ninja
    config-opts:
      - -DFASTFLOAT_TEST=OFF
    sources:
      - type: archive
        url: https://github.com/fastfloat/fast_float/archive/refs/tags/v8.0.2.tar.gz
        sha256: e14a33089712b681d74d94e2a11362643bd7d769ae8f7e7caefe955f57f7eacd

  - name: vte
    buildsystem: meson
    config-opts:
      - -Dglade=false
      - -Dgtk3=false
      - -Dgtk4=true
      - -Dvapi=false
      - -Dicu=false
      - -Dgir=false
      - -Ddocs=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/vte/0.80/vte-0.80.0.tar.xz
        sha256: 267f63739765e568cf8113d0e2ee8f593028946187854bebe268c778e62647c8
        x-checker-data:
          type: gnome
          name: vte
          stable-only: true
          versions:
            <: '0.81.0'

  - name: inetutils
    buildsystem: autotools
    config-opts:
      - --disable-servers
      - --disable-ifconfig
      - --disable-logger
      - --disable-syslogd
      - --disable-hostname
      - --disable-traceroute
      - --disable-talk
      - --disable-rcp
      - --disable-rlogin
      - --disable-rsh
      - --disable-rexec
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/inetutils/inetutils-2.7.tar.gz
        sha256: a156be1cde3c5c0ffefc262180d9369a60484087907aa554c62787d2f40ec086
        x-checker-data:
          type: anitya
          project-id: 1579
          stable-only: true
          url-template: https://ftp.gnu.org/gnu/inetutils/inetutils-$version.tar.gz

  - name: picocom
    buildsystem: simple
    build-commands:
      - make
      - install -Dm755 picocom /app/bin/picocom
    sources:
      - type: archive
        url: https://github.com/npat-efault/picocom/archive/refs/tags/3.1.tar.gz
        sha256: e6761ca932ffc6d09bd6b11ff018bdaf70b287ce518b3282d29e0270e88420bb
        x-checker-data:
          type: anitya
          project-id: 7592
          stable-only: true
          url-template: https://github.com/npat-efault/picocom/archive/refs/tags/$version.tar.gz

  - name: libsecret
    buildsystem: meson
    config-opts:
      - -Dgtk_doc=false
      - -Dintrospection=false
      - -Dvapi=false
      - -Dmanpage=false
      - -Dcrypto=disabled
      - -Dbash_completion=disabled
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.7.tar.xz
        sha256: 6b452e4750590a2b5617adc40026f28d2f4903de15f1250e1d1c40bfd68ed55e
        x-checker-data:
          type: gnome
          name: libsecret
          stable-only: true

  - name: slang
    buildsystem: autotools
    config-opts:
      - --without-png
      - --without-pcre
      - --without-onig
    sources:
      - type: archive
        url: https://www.jedsoft.org/releases/slang/slang-2.3.3.tar.bz2
        sha256: f9145054ae131973c61208ea82486d5dd10e3c5cdad23b7c4a0617743c8f5a18

  - name: mc
    buildsystem: autotools
    config-opts:
      # Use slang instead of ncurses — mc's ncurses backend cannot parse
      # SGR mouse sequences (mode 1006) from VTE 0.80+, causing raw escape
      # fragments to appear as text artifacts on mouse clicks.
      - --with-screen=slang
      - --disable-vfs-sftp
    post-install:
      # Host distros (e.g. openSUSE) export a bash function mc() that sources
      # /usr/share/mc/mc-wrapper.sh — a path absent in the Flatpak sandbox.
      # The exported function shadows /app/bin/mc. Fix: move the real binary
      # to mc.bin, patch mc-wrapper.sh to call mc.bin, and install a shell
      # wrapper at /app/bin/mc that unsets the inherited function then sources
      # the correct wrapper script.
      - mv /app/bin/mc /app/bin/mc.bin
      - sed -i 's|/app/bin/mc |/app/bin/mc.bin |g' /app/libexec/mc/mc-wrapper.sh
      - |
        printf '%s\n' '#!/bin/bash' 'unset -f mc 2>/dev/null' '. /app/libexec/mc/mc-wrapper.sh "$@"' > /app/bin/mc
      - chmod 755 /app/bin/mc
    sources:
      - type: archive
        url: http://ftp.midnight-commander.org/mc-4.8.33.tar.xz
        sha256: cae149d42f844e5185d8c81d7db3913a8fa214c65f852200a9d896b468af164c
        x-checker-data:
          type: anitya
          project-id: 1894
          stable-only: true
          url-template: http://ftp.midnight-commander.org/mc-$version.tar.xz

  - name: waypipe
    buildsystem: meson
    config-opts:
      # Build the C-only version — avoids pulling in cargo dependencies for waypipe itself
      - -Dbuild_rs=false
      - -Dbuild_c=true
      - -Dman-pages=disabled
      - -Dtests=false
      # Compression support (lz4/zstd available in GNOME SDK)
      - -Dwith_lz4=enabled
      - -Dwith_zstd=enabled
      # Disable GPU buffer sharing and video codec (not needed for basic Wayland forwarding)
      - -Dwith_dmabuf=disabled
      - -Dwith_video=disabled
    post-install:
      # C-only build installs as "waypipe-c"; create symlink so detection finds "waypipe"
      - ln -sf waypipe-c /app/bin/waypipe
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/mstoeckl/waypipe/-/archive/v0.11.0/waypipe-v0.11.0.tar.gz
        sha256: dc4741bd4435666b4b45ef9b8354c9f742e9c2c5fb99bb49b2ac4f32a371bcd7

  - name: rustconn-terminfo
    buildsystem: simple
    build-commands:
      # Create a custom terminfo entry identical to xterm-256color but
      # without the XM extended capability. XM tells ncurses/slang to
      # negotiate SGR mouse mode (1006) with VTE 0.80+, but mc cannot
      # parse SGR-encoded mouse events — causing raw escape fragments
      # like "7;6M7;6m" on every click. Removing XM prevents the
      # negotiation so VTE falls back to X10/normal mouse mode.
      - infocmp -x -1 xterm-256color | sed 's/xterm-256color/rustconn-256color/' | sed '/XM=/d' | tic -x -o /app/share/terminfo -
    sources: []

  - name: freerdp
    buildsystem: cmake-ninja
    config-opts:
      - -DALLOW_IN_SOURCE_BUILD=ON
      - -DWITH_SERVER=OFF
      - -DWITH_SHADOW=OFF
      - -DWITH_PROXY=OFF
      - -DWITH_PLATFORM_SERVER=OFF
      - -DWITH_X11=OFF
      - -DWITH_CLIENT_SDL2=OFF
      - -DWITH_CLIENT_SDL3=ON
      - -DCHANNEL_URBDRC=OFF
      - -DWITH_CUPS=OFF
      - -DWITH_PCSC=OFF
      - -DWITH_SWSCALE=OFF
      - -DWITH_FFMPEG=OFF
      - -DWITH_AAD=OFF
      - -DWITH_WEBVIEW=OFF
      - -DWITH_FUSE=OFF
      - -DWITH_KRB5=OFF
      - -DBUILD_TESTING=OFF
      - -DWITH_SAMPLE=OFF
      - -DWITH_MANPAGES=OFF
      - -DWITH_RDTK=OFF
    sources:
      - type: archive
        url: https://github.com/FreeRDP/FreeRDP/releases/download/3.24.1/freerdp-3.24.1.tar.gz
        sha256: 3217e429735ff65377db664cc668746099bae5197299dbfab8d02222454ebb8c
        x-checker-data:
          type: anitya
          project-id: 10442
          stable-only: true
          url-template: https://github.com/FreeRDP/FreeRDP/releases/download/$version/freerdp-$version.tar.gz

  - name: rustconn
    buildsystem: simple
    build-options:
      env:
        CARGO_NET_OFFLINE: 'true'
        PKG_CONFIG_PATH: /app/lib64/pkgconfig:/app/lib/pkgconfig:/app/share/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
    build-commands:
      # GNOME 50 SDK (GCC 15) appends -O2 via CFLAGS after aws-lc-sys sets -O0 for
      # jitterentropy-base.c, which triggers a #error requiring -O0. The wrapper
      # detects jitterentropy source files and forces -O0 at the very end.
      - |
        printf '%s\n' '#!/bin/sh' 'case "$*" in' '  *jitterentropy*)' '    exec /usr/bin/cc "$@" -O0' '    ;;' '  *)' '    exec /usr/bin/cc "$@"' '    ;;' 'esac' > /app/bin/cc-wrap
        chmod +x /app/bin/cc-wrap
      # Rename deprecated cargo/config to config.toml
      - if [ -f cargo/config ]; then mv cargo/config cargo/config.toml; fi
      - CC=/app/bin/cc-wrap cargo build --release -p rustconn --features adw-1-8 -p rustconn-cli
      - install -Dm755 target/release/rustconn /app/bin/rustconn
      - install -Dm755 target/release/rustconn-cli /app/bin/rustconn-cli
      - install -Dm644 rustconn/assets/io.github.totoshko88.RustConn.desktop /app/share/applications/io.github.totoshko88.RustConn.desktop
      - install -Dm644 rustconn/assets/io.github.totoshko88.RustConn-rdp.xml /app/share/mime/packages/io.github.totoshko88.RustConn-rdp.xml
      - install -Dm644 rustconn/assets/io.github.totoshko88.RustConn.metainfo.xml /app/share/metainfo/io.github.totoshko88.RustConn.metainfo.xml
      - install -Dm644 rustconn/assets/icons/hicolor/scalable/apps/io.github.totoshko88.RustConn.svg /app/share/icons/hicolor/scalable/apps/io.github.totoshko88.RustConn.svg
      # Install locale files (compile .po to .mo)
      - |
        for po_file in po/*.po; do
          [ -f "$po_file" ] || continue
          lang=$(basename "$po_file" .po)
          mkdir -p /app/share/locale/$lang/LC_MESSAGES
          msgfmt -o /app/share/locale/$lang/LC_MESSAGES/rustconn.mo "$po_file"
        done
    sources:
      - type: git
        url: https://github.com/totoshko88/RustConn.git
        tag: v0.10.14
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
      - cargo-sources.json
