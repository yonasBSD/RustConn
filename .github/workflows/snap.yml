name: Snap Build

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup LXD
        uses: canonical/setup-lxd@main

      - name: Install Snapcraft
        run: |
          # snapcraft 9.x is in latest/candidate (latest/stable still ships 8.x on this runner)
          # 9.x is required for core26 stable — 8.x rejects it without build-base: devel
          sudo snap install snapcraft --classic --candidate
          snapcraft --version

      - name: Build Snap
        id: build
        run: |
          snapcraft pack --verbose
          SNAP_FILE=$(ls *.snap)
          echo "snap=$SNAP_FILE" >> $GITHUB_OUTPUT
          echo "Built: $SNAP_FILE"

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v6
        with:
          name: snap-${{ github.ref_name }}
          path: ${{ steps.build.outputs.snap }}
