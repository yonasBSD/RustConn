name: OBS Update (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 0.15.8)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  update-obs:
    name: Update OBS Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd osc

      # Shared with release.yml → update-obs. All vendor/toolchain/changelog/osc
      # logic lives in scripts/obs-publish.sh (single source of truth).
      - name: Publish to OBS
        env:
          OBS_USERNAME: ${{ secrets.OBS_USERNAME }}
          OBS_PASSWORD: ${{ secrets.OBS_PASSWORD }}
          # Passed via env (not inline interpolation) so the dispatch input
          # can never be interpreted by the shell.
          VERSION: ${{ inputs.version }}
        run: ./scripts/obs-publish.sh "$VERSION"
